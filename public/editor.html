<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Secret Manager — Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <main class="mx-auto max-w-3xl px-4 py-10">
      <div class="mb-6 flex items-start justify-between gap-4">
        <div>
          <h1 class="text-2xl font-semibold">Secret Manager</h1>
          <p class="text-sm text-slate-500">
            Append-only, versioned secrets. Values are never shown here — only masked.
          </p>
        </div>
        <button
          id="logout"
          class="shrink-0 rounded-lg border border-slate-300 px-3 py-1.5 text-sm hover:bg-slate-50"
        >
          Log out
        </button>
      </div>

      <!-- Add secret -->
      <section class="mb-6 rounded-xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
        <h2 class="mb-3 text-base font-semibold">Add secret / new version</h2>
        <!-- autocomplete is disabled so the browser does not offer saved emails/usernames here -->
        <form id="add-form" autocomplete="off" class="grid gap-3 sm:grid-cols-[1fr_1fr_auto]">
          <input
            id="name"
            name="secret-base-name"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            data-lpignore="true"
            data-1p-ignore
            placeholder="BASE_NAME (e.g. OPENAI_AUTHORIZATION_KEY)"
            class="rounded-lg border border-slate-300 px-3 py-2 font-mono text-sm uppercase focus:border-slate-500 focus:outline-none"
          />
          <input
            id="value"
            name="secret-value"
            type="password"
            autocomplete="new-password"
            data-lpignore="true"
            data-1p-ignore
            placeholder="secret value"
            class="rounded-lg border border-slate-300 px-3 py-2 font-mono text-sm focus:border-slate-500 focus:outline-none"
          />
          <button
            type="submit"
            class="rounded-lg bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700 disabled:opacity-50"
          >
            Add
          </button>
        </form>
        <p class="mt-2 text-xs text-slate-500">
          New base name → version 1. Existing base name → next version. The server picks the number.
        </p>
      </section>

      <!-- Message -->
      <div id="message" class="mb-4 hidden rounded-lg px-4 py-3 text-sm"></div>

      <!-- Keys table -->
      <section class="rounded-xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-base font-semibold">Keys</h2>
          <button
            id="refresh"
            class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm hover:bg-slate-50"
          >
            Refresh
          </button>
        </div>
        <div id="keys"></div>
      </section>
    </main>

    <script>
      // Backend base URL — fixed in code, NOT user-editable. Hardcode a full URL
      // here if the API runs on a different host/port, e.g. 'http://127.0.0.1:4000'.
      const BACKEND_URL = window.location.origin;
      const SESSION_KEY = 'sm_session';
      const LOGIN_PATH = '/';

      const $ = (id) => document.getElementById(id);
      const messageBox = $('message');

      const sessionId = () => localStorage.getItem(SESSION_KEY) || '';
      function toLogin() {
        localStorage.removeItem(SESSION_KEY);
        window.location.replace(LOGIN_PATH);
      }

      // Gate: no session → straight back to the login page.
      if (!sessionId()) toLogin();

      function showMessage(text, kind = 'info') {
        const styles = {
          info: 'bg-slate-100 text-slate-700',
          success: 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200',
          error: 'bg-rose-50 text-rose-700 ring-1 ring-rose-200',
        };
        messageBox.className = `mb-4 rounded-lg px-4 py-3 text-sm ${styles[kind]}`;
        messageBox.textContent = text;
        messageBox.classList.remove('hidden');
      }

      function escapeHtml(s) {
        return String(s).replace(
          /[&<>"']/g,
          (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c],
        );
      }

      // revealed=false → "eye" (click to show); revealed=true → "eye-off" (click to hide)
      function eyeIcon(revealed) {
        const base =
          'xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" ' +
          'stroke-width="1.5" stroke="currentColor" class="h-5 w-5"';
        return revealed
          ? `<svg ${base}><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.243 4.243L9.88 9.88" /></svg>`
          : `<svg ${base}><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>`;
      }

      async function api(path, options = {}) {
        let res;
        try {
          res = await fetch(BACKEND_URL + path, {
            ...options,
            headers: {
              'content-type': 'application/json',
              authorization: `Bearer ${sessionId()}`,
              ...(options.headers || {}),
            },
          });
        } catch (err) {
          // Network-level failure: server down, wrong host/port, or blocked CORS.
          throw new Error(
            `Couldn't reach the backend at ${BACKEND_URL}. Is the server running, and is the ` +
              `address correct? (${err.message})`,
          );
        }
        let body = null;
        try {
          body = await res.json();
        } catch {
          /* non-JSON response */
        }
        if (res.status === 401) {
          // Session missing/expired — bounce to login.
          toLogin();
          throw new Error('unauthorized');
        }
        if (res.status === 405) {
          throw new Error(
            `Backend returned 405 (Method Not Allowed) for ${path}. The configured backend ` +
              `(${BACKEND_URL}) is wrong or is not the secret-manager server.`,
          );
        }
        if (!res.ok) {
          const msg = (body && body.error) || `Request failed (${res.status})`;
          throw new Error(`${msg} — backend: ${BACKEND_URL}`);
        }
        return body;
      }

      function renderKeys(keys) {
        const container = $('keys');
        if (!keys.length) {
          container.innerHTML =
            '<p class="text-sm text-slate-500">No secrets yet. Add one above.</p>';
          return;
        }
        container.innerHTML = keys
          .map(
            (k) => `
            <div class="mb-4 last:mb-0">
              <div class="mb-1 font-mono text-sm font-semibold text-slate-800">${escapeHtml(k.name)}</div>
              <table class="w-full text-sm">
                <thead>
                  <tr class="text-left text-xs uppercase tracking-wide text-slate-400">
                    <th class="w-24 py-1 font-medium">Version</th>
                    <th class="py-1 font-medium">Value</th>
                  </tr>
                </thead>
                <tbody>
                  ${k.versions
                    .map(
                      (v) => `
                    <tr class="border-t border-slate-100">
                      <td class="py-1.5 align-top font-mono text-slate-600">v${v.version}</td>
                      <td class="py-1.5">
                        <div class="flex items-center gap-2">
                          <span class="value min-w-0 break-all font-mono tracking-widest text-slate-400 select-none">••••••</span>
                          <button
                            type="button"
                            class="reveal-btn shrink-0 text-slate-400 hover:text-slate-700"
                            data-name="${escapeHtml(k.name)}"
                            data-version="${v.version}"
                            data-revealed="false"
                            aria-label="Show value"
                            title="Show value"
                          >${eyeIcon(false)}</button>
                        </div>
                      </td>
                    </tr>`,
                    )
                    .join('')}
                </tbody>
              </table>
            </div>`,
          )
          .join('');
      }

      async function loadKeys() {
        try {
          const body = await api('/keys');
          renderKeys(body.keys || []);
        } catch (err) {
          if (err.message !== 'unauthorized') showMessage(err.message, 'error');
        }
      }

      $('add-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = $('name').value.trim().toUpperCase();
        const value = $('value').value;
        if (!name || !value) {
          showMessage('Name and value are both required.', 'error');
          return;
        }
        try {
          const body = await api('/keys', {
            method: 'POST',
            body: JSON.stringify({ name, value }),
          });
          showMessage(`Saved ${body.name} as version ${body.version}.`, 'success');
          $('value').value = '';
          $('name').value = '';
          loadKeys();
        } catch (err) {
          if (err.message !== 'unauthorized') showMessage(err.message, 'error');
        }
      });

      // Reveal / hide a single value via the eye button (event-delegated, since the
      // table is re-rendered). Real values are fetched on demand, one at a time.
      $('keys').addEventListener('click', async (e) => {
        const btn = e.target.closest('.reveal-btn');
        if (!btn) return;
        const span = btn.parentElement.querySelector('.value');

        if (btn.dataset.revealed === 'true') {
          span.textContent = '••••••';
          span.classList.add('tracking-widest', 'text-slate-400', 'select-none');
          span.classList.remove('text-slate-800');
          btn.dataset.revealed = 'false';
          btn.innerHTML = eyeIcon(false);
          btn.title = btn.ariaLabel = 'Show value';
          return;
        }
        try {
          const body = await api('/reveal', {
            method: 'POST',
            body: JSON.stringify({ name: btn.dataset.name, version: Number(btn.dataset.version) }),
          });
          span.textContent = body.value;
          span.classList.remove('tracking-widest', 'text-slate-400', 'select-none');
          span.classList.add('text-slate-800');
          btn.dataset.revealed = 'true';
          btn.innerHTML = eyeIcon(true);
          btn.title = btn.ariaLabel = 'Hide value';
        } catch (err) {
          if (err.message !== 'unauthorized') showMessage(err.message, 'error');
        }
      });

      $('refresh').addEventListener('click', loadKeys);

      $('logout').addEventListener('click', async () => {
        try {
          await fetch(BACKEND_URL + '/logout', {
            method: 'POST',
            headers: { authorization: `Bearer ${sessionId()}` },
          });
        } catch {
          /* end the session locally regardless */
        }
        toLogin();
      });

      if (sessionId()) loadKeys();
    </script>
  </body>
</html>
